<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>༺ My Illustration ༻</title>
    <style>
        :root { --p: #8a7f9c; --frame-bg: #ffffff; }
        
        body { 
            margin: 0; padding: 0; font-family: "Noto Serif TC", serif;
            background: linear-gradient(rgba(255,255,255,0.6), rgba(255,255,255,0.6)), 
                        url('https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/21d1f82479dc6eec080d9e3f0d177698.jpg') center/cover fixed no-repeat !important;
        }

        /* 標題與簡介 */
        .header { text-align: center; padding: 60px 20px 20px; }
        .gallery-title { font-size: 26px; letter-spacing: 12px; color: var(--p); margin-bottom: 10px; }
        .intro { font-size: 15px; color: #555; letter-spacing: 1.5px; line-height: 1.8; }

        /* 畫廊核心 */
        .gallery-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .scroll-container { display: inline-flex; padding: 40px 80px 100px 80px; gap: 40px; align-items: center; }
        .art-frame { background: var(--frame-bg); padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #ddd; display: inline-flex !important; flex: 0 0 auto; transition: 0.4s; cursor: pointer; }
        .art-frame:hover { transform: translateY(-10px); }
        .art-frame img { display: block; height: 400px; width: auto; object-fit: contain; }

        /* 特殊組合高度鎖定 */
        .art-col { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .col-stack img { height: 185px; }
        .col-complex { width: 340px; }
        .col-complex .top-frame img { height: 180px; }
        .row-inner { display: flex; gap: 12px; }
        .row-inner img { height: 140px; }
        .col-sq img { height: 210px; }

        /* 固定播放器 */
        .music-player { position: fixed; bottom: 20px; left: 20px; background: rgba(255,255,255,0.85); padding: 12px 20px; border-radius: 50px; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(138,127,156,0.2); z-index: 1000; box-shadow: 0 5px 20px rgba(0,0,0,0.1); transform: scale(0.9); }
        .play-btn { cursor: pointer; color: var(--p); font-size: 22px; }
        .song-info { font-size: 13px; color: #666; font-weight: bold; }

        @media (max-width: 480px) {
            .art-frame img { height: 280px; }
            .col-stack img { height: 130px; }
            .music-player { transform: scale(0.75); bottom: 10px; left: 10px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="gallery-title">༺ GALLERY ༻</div>
    <div class="intro">「這是關於有各種困難的青少年們，如何成長的故事」</div>
</div>

<div class="gallery-outer">
    <div class="scroll-container">
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/IMG_5697.png"></div>
        <div class="art-col col-stack">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C951_20260118020109.png"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1067_20260118005441.png"></div>
        </div>
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/FB_IMG_1749826495034.jpg"></div>
        <div class="art-col col-complex">
            <div class="art-frame top-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1033_20260101025628.png"></div>
            <div class="row-inner">
                <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1102_20260208235836.png"></div>
                <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1102_20260208235846.png"></div>
            </div>
        </div>
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/FB_IMG_1769782908274.jpg"></div>
        <div class="art-col col-sq">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C933_20250810153340.png"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C933_20250811052051.png"></div>
        </div>
        <div class="art-col col-stack">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C397_20251222082314.png"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C393_20251215195508.png"></div>
        </div>
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1121_20260219211404.png"></div>
        <div class="art-col col-stack">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C887_20250622181052.png"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C887_20250622210234.png"></div>
        </div>
        <div class="art-col col-stack">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1016_20251216121552.png"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1016_20251216090827.png"></div>
        </div>
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C878_20250614021733.png"></div>
        <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C1103_20260210015346.png"></div>
        <div class="art-col col-stack">
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/FB_IMG_1751735099362.jpg"></div>
            <div class="art-frame"><img src="https://raw.githubusercontent.com/dorastar0523/my-illustrations/main/%E7%84%A1%E6%A8%99%E9%A1%8C860_20250618164117.png"></div>
        </div>
    </div>
</div>

<div class="music-player">
    <div class="play-btn" id="playBtn" onclick="togglePlay()">▶</div>
    <div class="song-info">《 蜜月アン・ドゥ・トロワ 》</div>
    <audio id="audio" loop src="https://cdn.discordapp.com/attachments/1100476484054941769/1487740314167935020/DATEKEN__320k_1.mp3?ex=69ca3da3&is=69c8ec23&hm=4f23c0dc5cb81e7397c99795c47d5df6aaeeac29c211da71c7b9f49db9f0a2e6&"></audio>
</div>

<script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    function togglePlay() {
        if (audio.paused) { audio.play(); playBtn.innerText = '❚❚'; }
        else { audio.pause(); playBtn.innerText = '▶'; }
    }
</script>
</body>
</html>
